app:
  env: dev
  timezone: Asia/Shanghai
  log_level: INFO

wechat:
  pc_version: "4.1.8.107"
  window_title: "微信"
  fixed_window: true
  check_login_interval_seconds: 300

runtime:
  log_dir: runtime/test/e2e/logs
  screenshot_dir: runtime/test/e2e/screenshots
  report_dir: runtime/test/e2e/reports

web:
  host: 127.0.0.1
  port: 8849
  secure_cookie: false
  tls_certfile: null
  tls_keyfile: null

auth:
  default_username: admin
  session_cookie_name: weinsight_e2e_session
  csrf_cookie_name: weinsight_e2e_csrf
  session_idle_minutes: 60
  session_absolute_minutes: 120
  login_failure_limit: 5
  login_lock_minutes: 15

workers:
  collector_mode: fake
  schedule_tick_seconds: 2
  heartbeat_seconds: 5
  run_lease_seconds: 60
  pipeline_tick_seconds: 2
  group_clean_batch_size: 50
  group_analysis_batch_size: 100
  article_parse_batch_size: 20
  article_analysis_batch_size: 20

pipelines:
  group:
    enabled: true
    core_group_limit: 5
    poll_interval_seconds: 30
    max_group_per_round: 5

    rpa_timeout_seconds: 60
    target_round_seconds: 60
  article:
    enabled: true
    account_limit: 20
    crawl_time: "07:30"
    account_poll_interval_minutes: 60
    max_articles_per_account: 5
    collect_today_only: true
    dedup_enabled: true
    dedup_key: article_hash
    browser_executable_path: auto
    parse_after_release_ui: true
    egg_price_extraction_enabled: true
    price_items_json_preview_limit: 20
    image_quote_note_enabled: true
    sync_interval_minutes: 10
    werss_catalog_base_url: http://127.0.0.1:8001
    werss_access_key: ${WEINSIGHT_WERSS_ACCESS_KEY}
    werss_secret_key: ${WEINSIGHT_WERSS_SECRET_KEY}
    rss_max_concurrency: 4
    rss_max_response_bytes: 5242880
    rss_allowed_private_hosts:
      - 127.0.0.1:8001
  ui_resource:
    mode: exclusive
    group_priority: true
    max_core_group_block_seconds: 10
    lock_acquire_timeout_seconds: 5
    lock_lease_seconds: 120
    lock_heartbeat_interval_seconds: 10
    stale_lock_recover_seconds: 180
    metrics_enabled: true

mysql:
  host: 127.0.0.1
  port: 3307
  database: weinsight_e2e
  username: weinsight
  password: ${WEINSIGHT_MYSQL_PASSWORD}
