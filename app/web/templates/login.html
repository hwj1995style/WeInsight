<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 · WeInsight</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-intro" aria-labelledby="login-title">
        <p class="brand">WeInsight</p>
        <h1 id="login-title">微信采集管理后台</h1>
        <p>安全访问管理功能，Web 与采集 Worker 保持独立运行。</p>
      </section>
      <section class="login-panel" aria-label="管理员登录">
        <h2>管理员登录</h2>
        {% if password_changed %}<p class="notice success" role="status">密码已修改，请重新登录</p>{% endif %}
        {% if error %}<p class="notice error" role="alert">{{ error }}</p>{% endif %}
        <form method="post" action="/login" novalidate>
          <input type="hidden" name="login_csrf" value="{{ login_csrf }}">
          <label for="username">用户名</label>
          <input id="username" name="username" autocomplete="username" required autofocus>
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="submit">登录</button>
        </form>
      </section>
    </main>
  </body>
</html>
