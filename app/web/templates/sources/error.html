{% extends "base.html" %}
{% block title %}操作未完成 · WeInsight{% endblock %}
{% block content %}
  <section class="content-panel narrow">
    <h1>操作未完成</h1>
    <p class="notice error" role="alert">{{ message }}</p>
    {% if job_names %}
      <h2 class="section-title">引用任务</h2>
      <ul class="reference-list">
        {% for job_name in job_names %}<li>{{ job_name }}</li>{% endfor %}
      </ul>
    {% endif %}
    <a class="button secondary" href="{{ return_url }}">返回名单</a>
  </section>
{% endblock %}
