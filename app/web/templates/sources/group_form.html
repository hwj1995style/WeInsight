{% extends "base.html" %}
{% block title %}{{ "编辑" if source_id else "新增" }}微信群 · WeInsight{% endblock %}
{% block content %}
  <section class="content-panel source-form-panel">
    <a class="back-link" href="/sources/groups">返回微信群名单</a>
    <h1>{{ "编辑微信群" if source_id else "新增微信群" }}</h1>
    <p class="muted">名单名称产生历史数据或被任务引用后不能修改。</p>
    {% if error %}<p class="notice error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/sources/groups/' ~ source_id if source_id else '/sources/groups' }}" class="source-form">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
      <label for="group-name">群名称</label>
      <input id="group-name" name="group_name" maxlength="200" value="{{ values.group_name }}" required>
      <div class="form-grid">
        <div>
          <label for="group-priority">优先级</label>
          <input id="group-priority" name="priority" type="number" min="1" max="100" value="{{ values.priority }}" required>
        </div>
        <div>
          <label for="group-interval">默认采集间隔（秒）</label>
          <input id="group-interval" name="poll_interval_seconds" type="number" min="30" value="{{ values.poll_interval_seconds }}" required>
        </div>
        <div>
          <label for="backtrack-pages">回溯页数</label>
          <input id="backtrack-pages" name="backtrack_pages" type="number" min="0" value="{{ values.backtrack_pages }}" required>
        </div>
        <div>
          <label for="extra-backtrack-pages">额外回溯页数</label>
          <input id="extra-backtrack-pages" name="extra_backtrack_pages" type="number" min="0" value="{{ values.extra_backtrack_pages }}" required>
        </div>
      </div>
      <label class="checkbox-field" for="is-core-group">
        <input id="is-core-group" name="is_core_group" type="checkbox" {% if values.is_core_group %}checked{% endif %}>
        设为核心群
      </label>
      <label for="group-remark">备注</label>
      <textarea id="group-remark" name="remark" maxlength="500" rows="4">{{ values.remark }}</textarea>
      <div class="form-actions">
        <button type="submit">保存配置</button>
        <a class="button secondary" href="/sources/groups">取消</a>
      </div>
    </form>
  </section>
{% endblock %}
