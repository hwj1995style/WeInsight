{% extends "base.html" %}
{% block title %}{{ "编辑" if source_id else "新增" }}公众号 · WeInsight{% endblock %}
{% block content %}
  <section class="content-panel source-form-panel">
    <a class="back-link" href="/sources/articles">返回公众号名单</a>
    <h1>{{ "编辑公众号" if source_id else "新增公众号" }}</h1>
    <p class="muted">采集间隔最少 10 分钟；名单名称产生历史数据或被任务引用后不能修改。</p>
    {% if error %}<p class="notice error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="{{ '/sources/articles/' ~ source_id if source_id else '/sources/articles' }}" class="source-form">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
      <label for="account-name">公众号名称</label>
      <input id="account-name" name="account_name" maxlength="200" value="{{ values.account_name }}" required>
      <div class="form-grid">
        <div>
          <label for="account-type">账号类型</label>
          <select id="account-type" name="account_type" required>
            <option value="subscription" {% if values.account_type == "subscription" %}selected{% endif %}>订阅号</option>
            <option value="official" {% if values.account_type == "official" %}selected{% endif %}>服务号</option>
          </select>
        </div>
        <div>
          <label for="article-priority">优先级</label>
          <input id="article-priority" name="priority" type="number" min="1" max="100" value="{{ values.priority }}" required>
        </div>
        <div>
          <label for="article-interval">默认采集间隔（分钟）</label>
          <input id="article-interval" name="poll_interval_minutes" type="number" min="10" value="{{ values.poll_interval_minutes }}" required aria-describedby="interval-help">
          <p id="interval-help" class="field-help">最少 10 分钟。</p>
        </div>
        <div>
          <label for="article-limit">每轮文章上限</label>
          <input id="article-limit" name="max_articles_per_round" type="number" min="1" max="20" value="{{ values.max_articles_per_round }}" required>
        </div>
        <div>
          <label for="window-start">每日窗口开始</label>
          <input id="window-start" name="daily_window_start" type="time" value="{{ values.daily_window_start }}" required>
        </div>
        <div>
          <label for="window-end">每日窗口结束</label>
          <input id="window-end" name="daily_window_end" type="time" value="{{ values.daily_window_end }}" required>
        </div>
      </div>
      <label class="checkbox-field" for="collect-today-only">
        <input id="collect-today-only" name="collect_today_only" type="checkbox" {% if values.collect_today_only %}checked{% endif %}>
        仅采集当天文章
      </label>
      <label for="article-remark">备注</label>
      <textarea id="article-remark" name="remark" maxlength="500" rows="4">{{ values.remark }}</textarea>
      <div class="form-actions">
        <button type="submit">保存配置</button>
        <a class="button secondary" href="/sources/articles">取消</a>
      </div>
    </form>
  </section>
{% endblock %}
