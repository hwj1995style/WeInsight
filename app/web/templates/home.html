{% extends "base.html" %}
{% block title %}账户设置 · WeInsight{% endblock %}
{% block content %}
  <section class="content-panel narrow">
    <a class="back-link" href="/dashboard">返回控制台</a>
    <h1>修改管理员密码</h1>
    <p class="muted">新密码至少 12 个字符。修改后需要重新登录。</p>
    {% if error %}<p class="notice error" role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="/account/password">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
      <label for="current-password">当前密码</label>
      <input id="current-password" name="current_password" type="password" autocomplete="current-password" required>
      <label for="new-password">新密码</label>
      <input id="new-password" name="new_password" type="password" autocomplete="new-password" minlength="12" required>
      <button type="submit">保存新密码</button>
    </form>
  </section>
{% endblock %}
